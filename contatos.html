ntent"><p class="copyright">© 2026 Nunca Studios</p></div></div></footer><script async src="https://nuncastudios.com/assets/js/scripts.js?v=3733efd39cd6c799b95c8fcb96993840"></script><script>document.getElementById('copyEmailBtn').addEventListener('click', function() {
    const email = this.getAttribute('data-email');
    const btnText = document.getElementById('btnText');
    const originalText = btnText.innerText;

    // Copia o texto para o clipboard
    navigator.clipboard.writeText(email).then(() => {
        // Feedback visual
        btnText.innerText = "COPIED!";
        this.classList.add('copied');

        // Volta ao normal depois de 2 segundos
        setTimeout(() => {
            btnText.innerText = originalText;
            this.classList.remove('copied');
        }, 2000);
    }).catch(err => {
        console.error('Erro ao copiar: ', err);
    });
});</script></html>
